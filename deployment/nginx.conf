server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php index.html;

    # Tamanho máximo de upload
    client_max_body_size 100M;

    # Buffers otimizados
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 16k;

    # Timeouts (aumentados para suportar processamento SPED de até 1 hora)
    client_body_timeout 3600;
    client_header_timeout 3600;
    keepalive_timeout 3600;
    send_timeout 3600;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/xml
        application/rss+xml
        image/svg+xml;
    gzip_disable "msie6";
    gzip_min_length 1000;

    # Cache agressivo para assets versionados pelo Vite (build/)
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        log_not_found off;
    }

    # Cache com revalidação para JS/CSS manuais (public/js/, public/css/)
    location ~* ^/(js|css)/ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        access_log off;
        log_not_found off;
    }

    # Cache longo para imagens e fontes
    location ~* \.(jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        log_not_found off;
    }

    # Denegar acesso a arquivos ocultos
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # SSE streaming endpoints - desabilita buffering para entrega em tempo real
    location ~* /progresso/stream {
        try_files $uri /index.php?$query_string;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root/index.php;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        include fastcgi_params;
        fastcgi_connect_timeout 3600s;
        fastcgi_send_timeout 3600s;
        fastcgi_read_timeout 3600s;
        fastcgi_buffering off;
        gzip off;
    }

    # Laravel - roteamento principal
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        include fastcgi_params;

        # Timeouts para PHP (aumentados para suportar processamento SPED de até 1 hora)
        fastcgi_connect_timeout 3600s;
        fastcgi_send_timeout 3600s;
        fastcgi_read_timeout 3600s;

        # Buffers para PHP
        fastcgi_buffer_size 128k;
        fastcgi_buffers 256 16k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_temp_file_write_size 256k;
    }

    # Denegar acesso a arquivos sensíveis
    location ~ /\.(env|git) {
        deny all;
        access_log off;
        log_not_found off;
    }
}
