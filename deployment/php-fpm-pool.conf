; Configuração do pool PHP-FPM para suportar processamento SPED de até 1 hora
; Este arquivo deve ser copiado para /usr/local/etc/php-fpm.d/www.conf ou similar

[www]
; Timeout de 1 hora (3600 segundos) para requisições longas como processamento SPED
request_terminate_timeout = 3600

; Outras configurações recomendadas para processamento longo
pm = dynamic
pm.max_children = 50
pm.start_servers = 5
pm.min_spare_servers = 5
pm.max_spare_servers = 35
pm.max_requests = 500

