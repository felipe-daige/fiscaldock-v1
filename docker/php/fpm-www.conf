; Start a new pool named 'www'.
[www]
request_terminate_timeout = 3600

user = www-data
group = www-data

; Choose how the process manager will control the number of child processes.
pm = dynamic

; Maximum number of child processes — increased to handle n8n burst requests
pm.max_children = 150

; Number of child processes created on startup
pm.start_servers = 15

; Minimum number of idle server processes
pm.min_spare_servers = 10

; Maximum number of idle server processes
pm.max_spare_servers = 50

; Maximum number of requests each child process should execute before respawning
pm.max_requests = 500

; Backlog size — increased to match kernel somaxconn and handle burst connections
listen.backlog = 4096
